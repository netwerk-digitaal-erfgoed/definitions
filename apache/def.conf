# Serve the generated vocabulary documentation with content negotiation.
#
# Each module lives in its own document-root subdirectory (probe/, metric/, …)
# holding the WIDOCO output and a .htaccess with the negotiation rules. We only
# need to let those .htaccess files take effect and to map the RDF file
# extensions to their media types.

<Directory "/usr/local/apache2/htdocs">
    # Let WIDOCO's per-module .htaccess drive negotiation (it sets
    # RewriteEngine on and Options -MultiViews itself).
    AllowOverride All
    Options +FollowSymLinks
    Require all granted
</Directory>

# A module root requested without a trailing slash (e.g. /probe) would get an
# http:// DirectorySlash redirect from mod_dir; behind the TLS-terminating
# ingress that downgrades the client to http. Issue the canonical https redirect
# ourselves at server scope (so it runs before mod_dir), keeping it on https.
RewriteEngine On
RewriteCond %{DOCUMENT_ROOT}%{REQUEST_URI} -d
RewriteCond %{REQUEST_URI} !/$
RewriteRule ^/(.+)$ https://%{HTTP_HOST}/$1/ [R=301,L]

# Media types for the RDF serializations WIDOCO emits, so the negotiated
# response carries the correct Content-Type.
AddType text/turtle .ttl
AddType application/n-triples .nt
AddType application/rdf+xml .rdf
AddType application/ld+json .jsonld
